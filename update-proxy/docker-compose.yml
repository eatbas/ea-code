services:
  ea-code-update-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ea-code-update-proxy
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - eameets-network
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/updates/release-info')"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  eameets-network:
    external: true
