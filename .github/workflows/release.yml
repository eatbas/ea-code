name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24.6.0"
  RUST_VERSION: "1.89.0"

defaults:
  run:
    working-directory: frontend/desktop

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/desktop/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (Windows NSIS x64)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend/desktop
          args: --bundles nsis
          tagName: v__VERSION__
          releaseName: "Maestro v__VERSION__"
          releaseBody: "See the assets below to download the installer for your platform."
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          includeUpdaterJson: false

  build-macos:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/desktop/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/desktop/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app (macOS universal bundle)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          AR: ""
          AR_aarch64_apple_darwin: ""
          "AR_aarch64-apple-darwin": ""
          AR_x86_64_apple_darwin: ""
          "AR_x86_64-apple-darwin": ""
          CC: ""
          CXX: ""
        with:
          projectPath: frontend/desktop
          args: --target universal-apple-darwin
          tagName: v__VERSION__
          releaseName: "Maestro v__VERSION__"
          releaseBody: "See the assets below to download the installer for your platform."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false

      - name: Upload macOS updater artefacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          bundle_dir="src-tauri/target/universal-apple-darwin/release/bundle/macos"
          updater_archive="$(find "${bundle_dir}" -maxdepth 1 -type f -name '*.app.tar.gz' | head -n 1)"
          updater_signature="$(find "${bundle_dir}" -maxdepth 1 -type f -name '*.app.tar.gz.sig' | head -n 1)"

          if [ -z "${updater_archive}" ] || [ -z "${updater_signature}" ]; then
            echo "Expected macOS updater artefacts were not generated in ${bundle_dir}" >&2
            echo "Contents of ${bundle_dir}:" >&2
            ls -la "${bundle_dir}" >&2 || true
            exit 1
          fi

          gh release upload "${{ github.ref_name }}" \
            "${updater_archive}" \
            "${updater_signature}" \
            --clobber \
            --repo "${{ github.repository }}"

  publish-updater-manifest:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    permissions:
      contents: write
    defaults:
      run:
        working-directory: .
    steps:
      - name: Publish merged updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          api_url="https://api.github.com/repos/${REPOSITORY}/releases/tags/${TAG}"
          release_json="$(mktemp)"

          curl -fsSL \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_url}" > "${release_json}"

          version="${TAG#v}"
          pub_date="$(jq -r '.published_at // .created_at' "${release_json}")"
          notes="$(jq -r '.body // ""' "${release_json}")"

          asset_url() {
            local pattern="$1"
            jq -r --arg pattern "${pattern}" '
              .assets[]
              | select(.name | test($pattern))
              | .browser_download_url
            ' "${release_json}" | head -n 1
          }

          fetch_asset_text() {
            local url="$1"
            curl -fsSL "${url}"
          }

          windows_url="$(asset_url "Maestro_[0-9.]+_x64-setup\\.exe$")"
          windows_sig_url="$(asset_url "Maestro_[0-9.]+_x64-setup\\.exe\\.sig$")"
          macos_url="$(asset_url "\\.app\\.tar\\.gz$")"
          macos_sig_url="$(asset_url "\\.app\\.tar\\.gz\\.sig$")"

          if [ -z "${windows_url}" ] || [ -z "${windows_sig_url}" ]; then
            echo "Missing Windows updater assets in release ${TAG}" >&2
            exit 1
          fi

          if [ -z "${macos_url}" ] || [ -z "${macos_sig_url}" ]; then
            echo "Missing macOS updater assets in release ${TAG}" >&2
            exit 1
          fi

          windows_sig="$(fetch_asset_text "${windows_sig_url}")"
          macos_sig="$(fetch_asset_text "${macos_sig_url}")"

          jq -n \
            --arg version "${version}" \
            --arg notes "${notes}" \
            --arg pub_date "${pub_date}" \
            --arg windows_url "${windows_url}" \
            --arg windows_sig "${windows_sig}" \
            --arg macos_url "${macos_url}" \
            --arg macos_sig "${macos_sig}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {
                  signature: $windows_sig,
                  url: $windows_url
                },
                "windows-x86_64-nsis": {
                  signature: $windows_sig,
                  url: $windows_url
                },
                "darwin-aarch64": {
                  signature: $macos_sig,
                  url: $macos_url
                },
                "darwin-x86_64": {
                  signature: $macos_sig,
                  url: $macos_url
                }
              }
            }' > latest.json

          gh release upload "${TAG}" latest.json --clobber --repo "${REPOSITORY}"
