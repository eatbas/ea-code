name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "24.6.0"
  RUST_VERSION: "1.89.0"

jobs:
  desktop-checks-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/desktop/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: frontend/desktop
        run: npm ci

      - name: TypeScript check (desktop)
        working-directory: frontend/desktop
        run: npx tsc --noEmit

      - name: Rust check (desktop)
        working-directory: frontend/desktop/src-tauri
        run: cargo check
