[env]
# Windows ARM64 builds (e.g. `ring`) require LLVM clang because MSVC support on
# aarch64 is incomplete for some crates. Route through repo-local wrappers that
# probe common install locations.
# x86_64 builds use the default MSVC toolchain (cl.exe) and need no override.
CC_aarch64_pc_windows_msvc = { value = ".cargo/tooling/clang.cmd", relative = true, force = false }
CXX_aarch64_pc_windows_msvc = { value = ".cargo/tooling/clang-cxx.cmd", relative = true, force = false }
